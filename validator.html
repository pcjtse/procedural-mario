<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Procedural Mario — Level Validator</title>
  <style>
    * { box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; margin: 0; }
    h1   { color: #FCB404; margin-bottom: 2px; }
    p    { color: #aaa; margin-top: 4px; font-size: 13px; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 16px; }
    label { font-size: 13px; color: #ccc; display: flex; flex-direction: column; gap: 4px; }
    input[type=number], select {
      background: #2a2a3e; border: 1px solid #555; color: #fff;
      padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; width: 120px;
    }
    button {
      background: #FCB404; border: none; color: #000; padding: 8px 18px;
      border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px; font-weight: bold;
    }
    button:disabled { background: #555; color: #999; cursor: not-allowed; }
    #progress { font-size: 13px; color: #aaa; margin-bottom: 8px; min-height: 18px; }
    #stats { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
    .stat-box { padding: 8px 14px; border-radius: 4px; font-size: 13px; border: 1px solid #444; }
    .stat-box.ok   { border-color: #44FF88; color: #44FF88; }
    .stat-box.warn { border-color: #FCB404; color: #FCB404; }
    .stat-box.fail { border-color: #FF5544; color: #FF5544; }
    #failures { max-height: 420px; overflow-y: auto; }
    .failure { background: #2a1a1a; border-left: 3px solid #FF5544; padding: 8px 10px; margin-bottom: 6px; border-radius: 0 4px 4px 0; font-size: 12px; }
    .failure .seed { color: #FF8855; font-weight: bold; }
    .failure .reasons { color: #ffb3b3; margin-top: 4px; }
    .failure .mini { color: #888; font-size: 11px; margin-top: 3px; }
    .ok-banner { color: #44FF88; background: #1a3a1a; border: 1px solid #44FF88; padding: 10px 14px; border-radius: 4px; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Procedural Mario — Level Validator</h1>
  <p>Generates N levels and checks each for structural validity: jumpable gaps, flagpole presence, entity safety.</p>

  <div class="controls">
    <label>Levels to generate
      <input id="count" type="number" min="1" max="5000" value="100">
    </label>
    <label>Start seed
      <input id="seedStart" type="number" min="0" value="1">
    </label>
    <label>Difficulty
      <select id="difficulty">
        <option value="-1">Random (0–1)</option>
        <option value="0">Easy (0.0)</option>
        <option value="0.5">Medium (0.5)</option>
        <option value="1">Hard (1.0)</option>
      </select>
    </label>
    <label>Theme
      <select id="theme">
        <option value="all">All (cycle)</option>
        <option value="overworld">Overworld</option>
        <option value="underground">Underground</option>
        <option value="sky">Sky</option>
        <option value="castle">Castle</option>
      </select>
    </label>
    <label style="flex-direction:row;align-items:center;gap:8px;">
      <input id="stopOnFirst" type="checkbox" checked>
      Stop after 10 failures
    </label>
    <button id="runBtn" onclick="runValidation()">▶ Run</button>
    <button id="stopBtn" onclick="stopValidation()" disabled>■ Stop</button>
  </div>

  <div id="progress"></div>
  <div id="stats"></div>
  <div id="failures"></div>

  <!-- Dependencies -->
  <script>window.ProcMario = {};</script>
  <script src="js/tiles.js"></script>
  <script src="js/tilemap.js"></script>
  <script src="js/levelgen.js"></script>

  <script>
  'use strict';

  var T = ProcMario.TileType;
  var GROUND_Y  = 13;
  var MAX_JUMP  = 5;   // tiles
  var THEMES    = ['overworld', 'underground', 'sky', 'castle'];

  var running   = false;
  var stopFlag  = false;

  // ── Validation checks ────────────────────────────────────────────

  function validate(level) {
    var reasons = [];
    var g = level.tiles, w = level.width, h = level.height;

    // 1. Flagpole present
    var hasPole = false, hasPoleTop = false;
    for (var y = 0; y < h && !hasPoleTop; y++) {
      for (var x = 0; x < w; x++) {
        if (g[y][x] === T.FLAGPOLE)     hasPole    = true;
        if (g[y][x] === T.FLAGPOLE_TOP) hasPoleTop = true;
      }
    }
    if (!hasPole)    reasons.push('Missing FLAGPOLE tile');
    if (!hasPoleTop) reasons.push('Missing FLAGPOLE_TOP tile');

    // 2. Max gap width
    var maxGap = 0, curGap = 0;
    for (var x2 = 0; x2 < w; x2++) {
      var solid = false;
      for (var y2 = GROUND_Y; y2 < h; y2++) {
        if (ProcMario.isSolid(g[y2][x2])) { solid = true; break; }
      }
      if (!solid) { curGap++; if (curGap > maxGap) maxGap = curGap; }
      else curGap = 0;
    }
    if (maxGap > MAX_JUMP) reasons.push('Gap of ' + maxGap + ' tiles (max ' + MAX_JUMP + ')');

    // 3. Safe start (first 8 tiles have ground)
    for (var xs = 0; xs < 8; xs++) {
      var startSolid = false;
      for (var ys = GROUND_Y; ys < h; ys++) {
        if (ProcMario.isSolid(g[ys][xs])) { startSolid = true; break; }
      }
      if (!startSolid) { reasons.push('Gap at safe start zone col ' + xs); break; }
    }

    // 4. Width in bounds
    if (w < 200 || w > 400) reasons.push('Width ' + w + ' out of bounds [200,400]');

    // 5. Height is 15
    if (h !== 15) reasons.push('Height ' + h + ' !== 15');

    // 6. Enemy overlap check — no two enemies at same tile position
    var enemyPos = {};
    level.entities.forEach(function(e) {
      if (e.type === 'goomba' || e.type === 'koopa' || e.type === 'piranha') {
        var key = e.x + ',' + e.y;
        if (enemyPos[key]) reasons.push('Enemy overlap at tile (' + e.x + ',' + e.y + ')');
        enemyPos[key] = true;
      }
    });

    // 7. No enemies in safe start zone
    level.entities.forEach(function(e) {
      if ((e.type === 'goomba' || e.type === 'koopa') && e.x < 10) {
        reasons.push('Enemy in safe zone: ' + e.type + ' at col ' + e.x);
      }
    });

    // 8. Entity count sanity
    var maxEnemies = Math.floor(w / 5);
    var enemies = level.entities.filter(function(e) {
      return e.type === 'goomba' || e.type === 'koopa' || e.type === 'piranha';
    });
    if (enemies.length > maxEnemies) {
      reasons.push('Enemy count ' + enemies.length + ' > max ' + maxEnemies);
    }

    // 9. No invalid tile IDs
    var validTileIds = [];
    Object.keys(T).forEach(function(k) { validTileIds.push(T[k]); });
    var badTiles = [];
    outer: for (var by = 0; by < h; by++) {
      for (var bx = 0; bx < w; bx++) {
        var tid = g[by][bx];
        if (validTileIds.indexOf(tid) === -1) {
          badTiles.push(tid);
          if (badTiles.length >= 3) break outer;
        }
      }
    }
    if (badTiles.length > 0) reasons.push('Invalid tile IDs: ' + badTiles.join(', '));

    return reasons;
  }

  // ── Render helpers ───────────────────────────────────────────────

  function showProgress(done, total, fails) {
    var pct = Math.round(done / total * 100);
    document.getElementById('progress').textContent =
      'Progress: ' + done + ' / ' + total + ' (' + pct + '%) — failures: ' + fails;
  }

  function showStats(passed, failed, total, ms) {
    var statsEl = document.getElementById('stats');
    statsEl.innerHTML =
      '<div class="stat-box ok">✓ Passed: ' + passed + '</div>' +
      (failed > 0
        ? '<div class="stat-box fail">✗ Failed: ' + failed + '</div>'
        : '<div class="stat-box ok">✗ Failed: 0</div>') +
      '<div class="stat-box warn">Total: ' + total + '</div>' +
      '<div class="stat-box">Time: ' + ms + ' ms</div>' +
      '<div class="stat-box">Avg: ' + (ms / total).toFixed(1) + ' ms/level</div>';
  }

  function addFailure(seed, theme, difficulty, reasons, levelInfo) {
    var div = document.createElement('div');
    div.className = 'failure';
    div.innerHTML =
      '<div class="seed">Seed ' + seed + ' | theme=' + theme + ' | diff=' + difficulty.toFixed(2) + '</div>' +
      '<div class="reasons">' + reasons.map(function(r) { return '• ' + esc(r); }).join('<br>') + '</div>' +
      '<div class="mini">width=' + levelInfo.width + ' height=' + levelInfo.height +
        ' entities=' + levelInfo.entities.length + '</div>';
    document.getElementById('failures').appendChild(div);
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  }

  function showOkBanner() {
    var div = document.createElement('div');
    div.className = 'ok-banner';
    div.textContent = '✓ All levels passed validation!';
    document.getElementById('failures').appendChild(div);
  }

  // ── Main validation loop ─────────────────────────────────────────

  function runValidation() {
    if (running) return;
    running  = true;
    stopFlag = false;
    document.getElementById('runBtn').disabled  = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('failures').innerHTML = '';
    document.getElementById('stats').innerHTML    = '';
    document.getElementById('progress').textContent = 'Starting…';

    var count     = Math.max(1, parseInt(document.getElementById('count').value,   10) || 100);
    var seedStart = Math.max(0, parseInt(document.getElementById('seedStart').value, 10) || 1);
    var diffVal   = parseFloat(document.getElementById('difficulty').value);
    var themeVal  = document.getElementById('theme').value;
    var stopAt10  = document.getElementById('stopOnFirst').checked;

    var done   = 0, passed = 0, failed = 0;
    var startMs = Date.now();

    function next() {
      if (stopFlag || done >= count || (stopAt10 && failed >= 10)) {
        var elapsed = Date.now() - startMs;
        showProgress(done, count, failed);
        showStats(passed, failed, done, elapsed);
        if (failed === 0) showOkBanner();
        running = false;
        document.getElementById('runBtn').disabled  = false;
        document.getElementById('stopBtn').disabled = true;
        return;
      }

      var i     = done;
      var seed  = seedStart + i;
      var diff  = diffVal < 0 ? Math.random() : diffVal;
      var theme = themeVal === 'all' ? THEMES[i % THEMES.length] : themeVal;

      try {
        var level = new ProcMario.LevelGenerator(seed, diff, theme).generate();
        var reasons = validate(level);
        if (reasons.length === 0) {
          passed++;
        } else {
          failed++;
          addFailure(seed, theme, diff, reasons, level);
        }
      } catch (e) {
        failed++;
        addFailure(seed, theme, diff, ['Exception: ' + e.message], { width: '?', height: '?', entities: [] });
      }

      done++;
      if (done % 10 === 0 || done === count) showProgress(done, count, failed);

      // Yield to the browser every 20 levels to keep UI responsive
      if (done % 20 === 0) {
        setTimeout(next, 0);
      } else {
        next();
      }
    }

    setTimeout(next, 0);
  }

  function stopValidation() {
    stopFlag = true;
  }
  </script>
</body>
</html>
