<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural Mario</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- SVG color matrix filters for colorblind simulation modes -->
  <svg id="colorblind-filters" xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter id="cb-protanopia">
        <feColorMatrix type="matrix" values="
          0.567 0.433 0     0 0
          0.558 0.442 0     0 0
          0     0.242 0.758 0 0
          0     0     0     1 0"/>
      </filter>
      <filter id="cb-deuteranopia">
        <feColorMatrix type="matrix" values="
          0.625 0.375 0     0 0
          0.7   0.3   0     0 0
          0     0.3   0.7   0 0
          0     0     0     1 0"/>
      </filter>
      <filter id="cb-tritanopia">
        <feColorMatrix type="matrix" values="
          0.95  0.05  0     0 0
          0     0.433 0.567 0 0
          0     0.475 0.525 0 0
          0     0     0     1 0"/>
      </filter>
      <filter id="cb-highcontrast">
        <feColorMatrix type="saturate" values="3"/>
        <feComponentTransfer>
          <feFuncR type="linear" slope="1.4" intercept="-0.2"/>
          <feFuncG type="linear" slope="1.4" intercept="-0.2"/>
          <feFuncB type="linear" slope="1.4" intercept="-0.2"/>
        </feComponentTransfer>
      </filter>
    </defs>
  </svg>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="scanlines"></div>
  </div>

  <!-- Global namespace -->
  <script>window.ProcMario = {};</script>

  <!-- Core engine (order matters: physics → camera → engine) -->
  <script src="js/physics.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/engine.js"></script>

  <!-- Tile system (tiles → tilemap → level generator) -->
  <script src="js/tiles.js"></script>
  <script src="js/tilemap.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/levelgen.js"></script>

  <!-- Pixel art, sprites, rendering, audio -->
  <script src="js/pixelart.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/audio.js"></script>

  <!-- Game entities (player → enemies → items → blocks → objects) -->
  <script src="js/player.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/items.js"></script>
  <script src="js/blocks.js"></script>
  <script src="js/objects.js"></script>

  <!-- Touch controls (virtual D-pad / buttons for mobile) -->
  <script src="js/touch.js"></script>

  <!-- Replay system: record + playback player input streams -->
  <script src="js/replay.js"></script>

  <!-- Main game orchestration (must be last) -->
  <script src="js/main.js"></script>
</body>
</html>
